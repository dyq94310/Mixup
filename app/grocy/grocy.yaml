apiVersion: apps/v1
kind: Deployment
metadata:
  name: grocy
  labels:
    app: grocy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grocy
  template:
    metadata:
      labels:
        app: grocy
    spec:
      nodeSelector:
        kubernetes.io/hostname: ccs
      containers:
        - name: grocy
          image: lscr.io/linuxserver/grocy:4.6.0
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Asia/Shanghai"
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: config-volume
              mountPath: /config
      volumes:
        - name: config-volume
          hostPath:
            path: /opt/k3s-data/grocy
            type: DirectoryOrCreate  

---
apiVersion: v1
kind: Service
metadata:
  name: grocy-svc
spec:
  selector:
    app: grocy
  ports:
  - protocol: TCP      
    port: 9283         
    targetPort: 80     
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grocy-ingress
spec:
  tls:
    - hosts:
        - grocy.groovydeng.eu.org
      secretName: cf-tls
  rules:
  - host: grocy.groovydeng.eu.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grocy-svc
            port:
              number: 9283   